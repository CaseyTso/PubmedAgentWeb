<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubMed Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','Noto Sans SC','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{bg:{primary:'#0a0f1a',secondary:'#111827',tertiary:'#1a2236',hover:'#1f2b3f'},accent:'#3b82f6',border:'rgba(99,148,210,0.12)'}}}}};
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--surface:#111827;--surface2:#1a2236;--border:rgba(99,148,210,0.12);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--green:#059669;--amber:#d97706;--red:#dc2626}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.18);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.35)}
input,textarea,select{font-family:inherit}

/* ===== Layout ===== */
.app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:1fr;height:100vh}
.header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:50}
.main-wrapper{display:flex;overflow:hidden;position:relative}

/* Sidebar: collapsible drawer on left */
.sidebar{width:320px;min-width:320px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px;transition:margin-left .3s ease,opacity .3s ease}
.sidebar.collapsed{margin-left:-320px;opacity:0;pointer-events:none}

.main{flex:1;overflow-y:auto;padding:32px 40px;background:var(--bg)}

/* Center content in main with max-width for readability */
.main-inner{max-width:960px;margin:0 auto;width:100%}

/* ===== Glass components ===== */
.card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s}
.card:hover{border-color:rgba(99,148,210,0.25)}

/* ===== Article cards ===== */
.article-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px 24px;transition:all .25s;animation:fadeSlideIn .4s ease forwards;opacity:0;transform:translateY(12px)}
.article-card:hover{border-color:rgba(99,148,210,0.3);box-shadow:0 4px 24px rgba(0,0,0,.2)}

@keyframes fadeSlideIn{to{opacity:1;transform:translateY(0)}}

/* ===== Form elements ===== */
.input-label{font-size:.7rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;display:block;font-family:'JetBrains Mono',monospace}
.input-field{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.85rem;outline:none;transition:border-color .2s}
.input-field:focus{border-color:var(--accent)}
textarea.input-field{resize:vertical;line-height:1.5}
.input-field::placeholder{color:var(--text3)}

/* ===== Accordion ===== */
.acc-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;user-select:none}
.acc-header h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:8px}
.acc-body{overflow:hidden;transition:max-height .3s ease;max-height:0}
.acc-body.open{max-height:800px}
.acc-chevron{transition:transform .2s}
.acc-header.active .acc-chevron{transform:rotate(180deg)}

/* ===== Score badge ===== */
.score-badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#fff;flex-shrink:0}
.score-high{background:#059669}
.score-mid{background:#d97706}
.score-low{background:#dc2626}

/* ===== Progress ===== */
.progress-bar{height:4px;background:rgba(59,130,246,.12);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:2px;transition:width .4s ease;width:0}

/* ===== Tabs ===== */
.tab{padding:7px 18px;font-size:.84rem;font-weight:500;border-radius:8px;cursor:pointer;color:var(--text3);transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{background:rgba(59,130,246,.12);color:var(--accent)}

/* ===== Buttons ===== */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:.9rem;font-weight:600;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-primary:hover{background:#2563eb}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-primary.running{background:#dc2626}
.btn-primary.running:hover{background:#b91c1c}

.btn-sm{padding:7px 16px;font-size:.76rem;font-weight:500;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-sm:hover{background:var(--surface2);color:var(--text)}

.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all .2s;font-size:1.1rem}
.btn-icon:hover{background:var(--surface2);color:var(--text);border-color:rgba(99,148,210,0.25)}

/* ===== Empty state ===== */
.empty-state{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-state i{font-size:52px;margin-bottom:16px;display:block;opacity:.35}

/* ===== Pagination ===== */
.page-btn{padding:5px 12px;font-size:.76rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s}
.page-btn:hover{background:var(--surface2);color:var(--text)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:not-allowed}

/* ===== Responsive ===== */
@media(max-width:900px){
  .sidebar{position:fixed;left:0;top:56px;bottom:0;width:320px;z-index:100;box-shadow:4px 0 24px rgba(0,0,0,.5);margin-left:-320px;opacity:0;pointer-events:none}
  .sidebar.open{margin-left:0;opacity:1;pointer-events:auto}
  .sidebar-overlay.open{display:block}
  .mobile-toggle{display:flex!important}
  .desktop-toggle{display:none!important}
  .main{padding:20px 16px}
}
@media(min-width:901px){
  .sidebar-overlay{display:none!important}
}

.sidebar-overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.5);z-index:99}
</style>
</head>
<body>
<div class="app">
  <!-- ====== HEADER ====== -->
  <header class="header">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="mobile-toggle" onclick="toggleSidebar()" style="display:none;background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.3rem"><i class="ph ph-list"></i></button>
      <button class="btn-icon desktop-toggle" onclick="toggleSidebarDesktop()" title="Toggle sidebar">
        <i class="ph ph-sidebar-simple" id="sidebar-toggle-icon"></i>
      </button>
      <div style="display:flex;align-items:center;gap:8px">
        <i class="ph-fill ph-article-ny-times" style="font-size:1.4rem;color:var(--accent)"></i>
        <span style="font-weight:700;font-size:1.05rem;letter-spacing:-0.01em">PubMed Monitor</span>
      </div>
      <div style="display:flex;gap:4px;margin-left:16px">
        <div class="tab active" data-tab="search" onclick="switchTab('search')"><i class="ph ph-magnifying-glass" style="margin-right:4px"></i>搜索</div>
        <div class="tab" data-tab="history" onclick="switchTab('history')"><i class="ph ph-clock-counter-clockwise" style="margin-right:4px"></i>历史</div>
      </div>
    </div>
    <div id="header-stats" style="display:flex;align-items:center;gap:14px;font-size:.76rem;color:var(--text3);font-family:'JetBrains Mono',monospace">
      <span id="stat-total" title="已追踪文献总数"><i class="ph ph-database"></i> —</span>
      <span id="stat-relevant" title="高相关度文献"><i class="ph ph-star"></i> —</span>
    </div>
  </header>

  <!-- ====== BODY ====== -->
  <div class="main-wrapper">
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      <!-- PubMed Query -->
      <div class="card" style="margin-bottom:12px">
        <div class="acc-header active" onclick="toggleAcc(this)">
          <h3><i class="ph ph-magnifying-glass" style="color:var(--accent)"></i> PubMed 检索</h3>
          <i class="ph ph-caret-down acc-chevron"></i>
        </div>
        <div class="acc-body open">
          <div style="padding-bottom:12px">
            <label class="input-label">检索式</label>
            <textarea class="input-field" id="cfg-query" rows="4" placeholder='(CAR-T[tiab] OR "chimeric antigen receptor"[tiab]) AND ("cytokine release syndrome"[tiab] OR CRS[tiab])'></textarea>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
              <div>
                <label class="input-label">回溯天数</label>
                <input type="number" class="input-field" id="cfg-days" value="2" min="1" max="30">
              </div>
              <div>
                <label class="input-label">最大条数</label>
                <input type="number" class="input-field" id="cfg-max-results" value="100" min="1" max="1000">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Research Profile -->
      <div class="card" style="margin-bottom:12px">
        <div class="acc-header active" onclick="toggleAcc(this)">
          <h3><i class="ph ph-user-circle" style="color:#a78bfa"></i> 研究画像</h3>
          <i class="ph ph-caret-down acc-chevron"></i>
        </div>
        <div class="acc-body open">
          <div style="padding-bottom:12px">
            <label class="input-label">研究方向描述</label>
            <textarea class="input-field" id="cfg-description" rows="5" placeholder="描述你的研究兴趣，LLM 将基于此判断文献相关度..."></textarea>
            <div style="margin-top:8px">
              <label class="input-label">最低相关度阈值: <span id="score-display">6</span></label>
              <input type="range" id="cfg-min-score" min="0" max="10" value="6" style="width:100%;accent-color:var(--accent)" oninput="document.getElementById('score-display').textContent=this.value;saveConfig()">
            </div>
          </div>
        </div>
      </div>

      <!-- LLM Settings -->
      <div class="card" style="margin-bottom:16px">
        <div class="acc-header" onclick="toggleAcc(this)">
          <h3><i class="ph ph-brain" style="color:#f472b6"></i> LLM 设置</h3>
          <i class="ph ph-caret-down acc-chevron"></i>
        </div>
        <div class="acc-body">
          <div style="padding-bottom:12px">
            <label class="input-label">API Key</label>
            <div style="position:relative">
              <input type="password" class="input-field" id="cfg-api-key" placeholder="sk-..." style="padding-right:36px">
              <button onclick="toggleKeyVis()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem"><i class="ph ph-eye" id="key-eye-icon"></i></button>
            </div>
            <label class="input-label" style="margin-top:8px">Base URL</label>
            <input type="text" class="input-field" id="cfg-base-url" placeholder="https://api.deepseek.com/v1">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
              <div>
                <label class="input-label">模型</label>
                <input type="text" class="input-field" id="cfg-model" value="deepseek-chat">
              </div>
              <div>
                <label class="input-label">Temperature</label>
                <input type="number" class="input-field" id="cfg-temperature" value="0.1" min="0" max="2" step="0.1">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Search Button -->
      <button class="btn-primary" id="btn-search" onclick="runSearch()">
        <i class="ph ph-magnifying-glass"></i>
        <span id="btn-search-text">搜索 & 评分</span>
      </button>
    </aside>

    <!-- ====== MAIN CONTENT ====== -->
    <main class="main" id="main-content">
      <div class="main-inner">
        <!-- Search Tab -->
        <div id="tab-search">
          <!-- Progress area -->
          <div id="progress-area" style="display:none;margin-bottom:24px">
            <div class="card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                <span id="progress-msg" style="font-size:.88rem;color:var(--text2)">准备中...</span>
                <span id="progress-pct" style="font-size:.78rem;color:var(--text3);font-family:'JetBrains Mono',monospace">0%</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
          </div>

          <!-- Results summary -->
          <div id="results-summary" style="display:none;margin-bottom:20px">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
              <div style="display:flex;align-items:center;gap:12px">
                <span id="summary-text" style="font-size:.88rem;color:var(--text2)"></span>
              </div>
              <div style="display:flex;gap:8px;align-items:center">
                <button class="btn-sm" onclick="exportReport()"><i class="ph ph-download-simple"></i> 导出报告</button>
                <select id="sort-select" onchange="sortResults()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.76rem;color:var(--text2);outline:none;cursor:pointer">
                  <option value="score">按相关度</option>
                  <option value="date">按日期</option>
                  <option value="title">按标题</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Results list -->
          <div id="results-list"></div>

          <!-- Empty state -->
          <div id="empty-search" class="empty-state">
            <i class="ph ph-article-ny-times"></i>
            <p style="font-size:1rem;margin-bottom:8px;color:var(--text2)">配置左侧参数，点击「搜索 & 评分」开始</p>
            <p style="font-size:.82rem">Agent 将自动检索 PubMed、LLM 阅读摘要、智能评分推荐</p>
          </div>
        </div>

        <!-- History Tab -->
        <div id="tab-history" style="display:none">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
            <h2 style="font-size:1.1rem;font-weight:600">历史记录</h2>
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" class="input-field" id="history-search" placeholder="搜索标题..." style="width:220px;padding:7px 12px;font-size:.8rem" oninput="loadHistory()">
              <select id="history-min-score" onchange="loadHistory()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:.76rem;color:var(--text2);outline:none;cursor:pointer">
                <option value="0">全部评分</option>
                <option value="6">≥ 6 分</option>
                <option value="8">≥ 8 分</option>
              </select>
              <button class="btn-sm" onclick="exportHistory()"><i class="ph ph-download-simple"></i> 导出</button>
            </div>
          </div>
          <div id="history-list"></div>
          <div id="history-pagination" style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:20px"></div>
          <div id="empty-history" class="empty-state" style="display:none">
            <i class="ph ph-clock-counter-clockwise"></i>
            <p style="font-size:1rem;color:var(--text2)">暂无历史记录</p>
            <p style="font-size:.82rem">完成一次搜索后，评分结果将自动保存</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ==========================================================================
// State
// ==========================================================================
const CONFIG_KEY = 'pubmed_monitor_config';
let currentResults = [];
let isSearching = false;
let abortController = null;
let historyPage = 1;
let sidebarCollapsed = false;

// Default config
const DEFAULT_CONFIG = {
  query: '(CAR-T[tiab] OR "chimeric antigen receptor"[tiab] OR CAR T-cell[tiab])\nAND\n("cytokine release syndrome"[tiab] OR CRS[tiab] OR "cytokine storm"[tiab])',
  description: 'My research focuses on the pathogenesis of cytokine release syndrome (CRS) induced by CAR-T cell therapy. I am interested in:\n- Molecular mechanisms underlying CRS (IL-6, IL-1, TNF-alpha, IFN-gamma signaling)\n- The role of macrophages, monocytes, and endothelial cells in CRS\n- Biomarkers for predicting CRS severity\n- Novel therapeutic strategies for CRS management\n- Animal models of CAR-T-induced CRS\n- Clinical studies reporting CRS outcomes and risk factors\nI am NOT interested in: manufacturing/production of CAR-T cells, purely clinical efficacy studies without CRS focus, reviews with no new mechanistic insight.',
  days: '2',
  maxResults: '100',
  minScore: '6',
  llmApiKey: '',
  llmBaseUrl: 'https://api.deepseek.com/v1',
  llmModel: 'deepseek-chat',
  llmTemperature: '0.1',
};

// ==========================================================================
// Config persistence
// ==========================================================================
function getEl(id) { return document.getElementById(id); }

function loadConfig() {
  let cfg;
  try { cfg = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {}; } catch { cfg = {}; }
  cfg = { ...DEFAULT_CONFIG, ...cfg };

  getEl('cfg-query').value = cfg.query;
  getEl('cfg-description').value = cfg.description;
  getEl('cfg-days').value = cfg.days;
  getEl('cfg-max-results').value = cfg.maxResults;
  getEl('cfg-min-score').value = cfg.minScore;
  getEl('score-display').textContent = cfg.minScore;
  getEl('cfg-api-key').value = cfg.llmApiKey;
  getEl('cfg-base-url').value = cfg.llmBaseUrl;
  getEl('cfg-model').value = cfg.llmModel;
  getEl('cfg-temperature').value = cfg.llmTemperature;
}

function saveConfig() {
  const cfg = {
    query: getEl('cfg-query').value,
    description: getEl('cfg-description').value,
    days: getEl('cfg-days').value,
    maxResults: getEl('cfg-max-results').value,
    minScore: getEl('cfg-min-score').value,
    llmApiKey: getEl('cfg-api-key').value,
    llmBaseUrl: getEl('cfg-base-url').value,
    llmModel: getEl('cfg-model').value,
    llmTemperature: getEl('cfg-temperature').value,
  };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}

// Auto-save on any input
document.querySelectorAll('.input-field, #cfg-min-score').forEach(el => {
  el.addEventListener('input', saveConfig);
  el.addEventListener('change', saveConfig);
});

// ==========================================================================
// UI Helpers
// ==========================================================================
function toggleAcc(header) {
  header.classList.toggle('active');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

function toggleKeyVis() {
  const inp = getEl('cfg-api-key');
  const icon = getEl('key-eye-icon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'ph ph-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'ph ph-eye'; }
}

function toggleSidebar() {
  getEl('sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('open');
}

function toggleSidebarDesktop() {
  const sidebar = getEl('sidebar');
  sidebarCollapsed = !sidebarCollapsed;
  sidebar.classList.toggle('collapsed', sidebarCollapsed);
  const icon = getEl('sidebar-toggle-icon');
  icon.className = sidebarCollapsed ? 'ph ph-sidebar-simple' : 'ph ph-sidebar-simple';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  getEl('tab-search').style.display = name === 'search' ? '' : 'none';
  getEl('tab-history').style.display = name === 'history' ? '' : 'none';
  if (name === 'history') loadHistory();
}

function scoreBadgeClass(score) {
  if (score >= 8) return 'score-high';
  if (score >= 5) return 'score-mid';
  return 'score-low';
}

function truncAuthors(authors) {
  if (!authors || !authors.length) return '';
  const show = authors.slice(0, 3).join(', ');
  return authors.length > 3 ? show + ' et al.' : show;
}

function showProgress(msg, pct) {
  const area = getEl('progress-area');
  area.style.display = '';
  getEl('progress-msg').textContent = msg;
  getEl('progress-pct').textContent = pct + '%';
  getEl('progress-fill').style.width = pct + '%';
}

function hideProgress() {
  getEl('progress-area').style.display = 'none';
}

// ==========================================================================
// Article Card Rendering
// ==========================================================================
function renderArticleCard(a, delay) {
  const card = document.createElement('div');
  card.className = 'article-card';
  card.style.marginBottom = '14px';
  card.style.animationDelay = (delay * 60) + 'ms';
  const authors = truncAuthors(a.authors);
  const keywords = a.keywords && a.keywords.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${a.keywords.slice(0, 6).map(k => `<span style="font-size:.68rem;padding:2px 8px;border-radius:4px;background:rgba(59,130,246,.1);color:#93c5fd">${escHtml(k)}</span>`).join('')}</div>`
    : '';
  card.innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div class="score-badge ${scoreBadgeClass(a.score)}">${a.score}</div>
      <div style="flex:1;min-width:0">
        <a href="${a.url}" target="_blank" rel="noopener" style="font-size:.95rem;font-weight:600;color:var(--text);text-decoration:none;line-height:1.5;display:block;transition:color .2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${escHtml(a.title)}</a>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;font-size:.76rem;color:var(--text3);font-family:'JetBrains Mono',monospace;flex-wrap:wrap">
          <span>${escHtml(a.journal)}</span>
          <span style="opacity:.4">|</span>
          <span>${escHtml(a.pub_date)}</span>
          <span style="opacity:.4">|</span>
          <span>PMID: ${a.pmid}</span>
        </div>
        ${authors ? `<div style="font-size:.78rem;color:var(--text3);margin-top:4px">${escHtml(authors)}</div>` : ''}
        <div style="font-size:.84rem;color:#a78bfa;margin-top:10px;line-height:1.6;padding:8px 12px;background:rgba(167,139,250,0.06);border-radius:8px;border-left:3px solid rgba(167,139,250,0.25)">${escHtml(a.reason)}</div>
        ${keywords}
        ${a.abstract ? `
        <details style="margin-top:10px">
          <summary style="cursor:pointer;font-size:.76rem;color:var(--text3);user-select:none;padding:4px 0">展开摘要</summary>
          <p style="font-size:.82rem;color:var(--text2);line-height:1.7;margin-top:8px;white-space:pre-wrap">${escHtml(a.abstract)}</p>
        </details>` : ''}
      </div>
    </div>`;
  return card;
}

function escHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ==========================================================================
// Search (SSE)
// ==========================================================================
async function runSearch() {
  if (isSearching) { cancelSearch(); return; }

  const query = getEl('cfg-query').value.trim();
  const description = getEl('cfg-description').value.trim();
  const apiKey = getEl('cfg-api-key').value.trim();

  if (!query) { alert('请输入 PubMed 检索式'); return; }
  if (!description) { alert('请输入研究方向描述'); return; }
  if (!apiKey) { alert('请输入 LLM API Key'); return; }

  saveConfig();

  // Reset UI
  currentResults = [];
  getEl('results-list').innerHTML = '';
  getEl('empty-search').style.display = 'none';
  getEl('results-summary').style.display = 'none';
  showProgress('准备中...', 0);
  setSearchState(true);

  // On mobile, close sidebar when search starts
  if (window.innerWidth <= 900) {
    getEl('sidebar').classList.remove('open');
    document.querySelector('.sidebar-overlay').classList.remove('open');
  }

  abortController = new AbortController();

  const body = {
    query: query,
    research_description: description,
    days: parseInt(getEl('cfg-days').value) || 2,
    max_results: parseInt(getEl('cfg-max-results').value) || 100,
    min_score: parseInt(getEl('cfg-min-score').value) || 6,
    llm_api_key: apiKey,
    llm_base_url: getEl('cfg-base-url').value.trim(),
    llm_model: getEl('cfg-model').value.trim() || 'deepseek-chat',
    llm_temperature: parseFloat(getEl('cfg-temperature').value) || 0.1,
    skip_seen: true,
  };

  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: abortController.signal,
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errText}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse SSE from buffer
      const lines = buffer.split('\n');
      buffer = lines.pop(); // incomplete line stays in buffer
      let currentEvent = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const dataStr = line.slice(6);
          try {
            const data = JSON.parse(dataStr);
            handleSSE(currentEvent, data);
          } catch {}
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      showProgress('搜索出错: ' + err.message, 0);
      console.error(err);
    }
  } finally {
    setSearchState(false);
    loadStats();
  }
}

function handleSSE(event, data) {
  switch (event) {
    case 'progress':
      showProgress(data.message, data.percent || 0);
      break;
    case 'article':
      currentResults.push(data);
      const card = renderArticleCard(data, currentResults.length - 1);
      getEl('results-list').appendChild(card);
      updateSummary();
      break;
    case 'complete':
      showProgress(`完成! 共评分 ${data.total_scored} 篇，${data.passed} 篇通过阈值`, 100);
      setTimeout(hideProgress, 3000);
      updateSummary();
      break;
    case 'error':
      showProgress('错误: ' + data.message, 0);
      break;
  }
}

function cancelSearch() {
  if (abortController) abortController.abort();
  setSearchState(false);
  showProgress('已取消', 0);
  setTimeout(hideProgress, 2000);
}

function setSearchState(running) {
  isSearching = running;
  const btn = getEl('btn-search');
  const txt = getEl('btn-search-text');
  if (running) {
    btn.classList.add('running');
    txt.innerHTML = '<i class="ph ph-stop-circle"></i> 取消搜索';
  } else {
    btn.classList.remove('running');
    txt.innerHTML = '<i class="ph ph-magnifying-glass"></i> 搜索 & 评分';
  }
}

function updateSummary() {
  if (currentResults.length === 0) return;
  getEl('results-summary').style.display = '';
  getEl('summary-text').textContent = `找到 ${currentResults.length} 篇相关文献 (评分 ≥ ${getEl('cfg-min-score').value})`;
}

// ==========================================================================
// Sort Results
// ==========================================================================
function sortResults() {
  const key = getEl('sort-select').value;
  const sorted = [...currentResults];
  if (key === 'score') sorted.sort((a, b) => b.score - a.score);
  else if (key === 'date') sorted.sort((a, b) => (b.pub_date || '').localeCompare(a.pub_date || ''));
  else if (key === 'title') sorted.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
  currentResults = sorted;
  const list = getEl('results-list');
  list.innerHTML = '';
  sorted.forEach((a, i) => list.appendChild(renderArticleCard(a, i)));
}

// ==========================================================================
// History
// ==========================================================================
async function loadHistory() {
  const search = getEl('history-search').value.trim();
  const minScore = parseInt(getEl('history-min-score').value) || 0;

  try {
    const params = new URLSearchParams({ page: historyPage, per_page: 30, min_score: minScore, search });
    const resp = await fetch('/api/history?' + params);
    const data = await resp.json();

    const list = getEl('history-list');
    const empty = getEl('empty-history');

    if (data.items.length === 0) {
      list.innerHTML = '';
      empty.style.display = '';
      getEl('history-pagination').innerHTML = '';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = '';
    data.items.forEach((a, i) => {
      list.appendChild(renderArticleCard(a, i));
    });

    // Pagination
    renderPagination(data.total, data.page, data.per_page);
  } catch (err) {
    console.error('History load error:', err);
  }
}

function renderPagination(total, page, perPage) {
  const pages = Math.ceil(total / perPage);
  const container = getEl('history-pagination');
  container.innerHTML = '';

  if (pages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-btn';
  prev.textContent = '← 上一页';
  prev.disabled = page <= 1;
  prev.onclick = () => { historyPage = page - 1; loadHistory(); };
  container.appendChild(prev);

  const info = document.createElement('span');
  info.style.cssText = 'font-size:.76rem;color:var(--text3)';
  info.textContent = `第 ${page} / ${pages} 页 (共 ${total} 条)`;
  container.appendChild(info);

  const next = document.createElement('button');
  next.className = 'page-btn';
  next.textContent = '下一页 →';
  next.disabled = page >= pages;
  next.onclick = () => { historyPage = page + 1; loadHistory(); };
  container.appendChild(next);
}

// ==========================================================================
// Export
// ==========================================================================
function exportReport() {
  if (!currentResults.length) return;
  const html = buildExportHTML(currentResults);
  downloadFile(html, `pubmed-report-${dateStr()}.html`, 'text/html');
}

async function exportHistory() {
  const minScore = parseInt(getEl('history-min-score').value) || 0;
  const search = getEl('history-search').value.trim();
  try {
    const params = new URLSearchParams({ page: 1, per_page: 500, min_score: minScore, search });
    const resp = await fetch('/api/history?' + params);
    const data = await resp.json();
    if (!data.items.length) { alert('无数据可导出'); return; }
    const html = buildExportHTML(data.items);
    downloadFile(html, `pubmed-history-${dateStr()}.html`, 'text/html');
  } catch (err) { alert('导出失败: ' + err.message); }
}

function buildExportHTML(articles) {
  const now = dateStr();
  let rows = '';
  articles.forEach((a, i) => {
    const authors = truncAuthors(a.authors || []);
    const sc = a.score || 0;
    const color = sc >= 8 ? '#059669' : sc >= 5 ? '#d97706' : '#dc2626';
    const abs = (a.abstract || '').replace(/\n/g, '<br>');
    rows += `
    <div style="border:1px solid #e5e7eb;border-radius:10px;padding:20px;margin-bottom:14px;page-break-inside:avoid">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <span style="background:${color};color:#fff;border-radius:50%;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0">${sc}</span>
        <h3 style="margin:0;font-size:14px;line-height:1.5"><a href="${a.url||''}" target="_blank" style="color:#1d4ed8;text-decoration:none">${a.title||''}</a></h3>
      </div>
      <p style="margin:3px 0;font-size:12px;color:#6b7280">${a.journal||''} | ${a.pub_date||''} | PMID: ${a.pmid||''}</p>
      ${authors?`<p style="margin:3px 0;font-size:12px;color:#6b7280">${authors}</p>`:''}
      <p style="margin:8px 0 4px;font-size:12.5px;color:#4338ca;font-style:italic">${a.reason||''}</p>
      ${abs?`<details style="margin-top:8px"><summary style="cursor:pointer;font-size:11px;color:#9ca3af">Abstract</summary><p style="margin:6px 0;font-size:12px;color:#374151;line-height:1.65">${abs}</p></details>`:''}
    </div>`;
  });

  return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PubMed 文献报告 — ${now}</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:820px;margin:0 auto;padding:28px;color:#1f2937;background:#fff}
h1{font-size:20px;border-bottom:2px solid #3b82f6;padding-bottom:8px;margin-bottom:4px}
.meta{color:#6b7280;font-size:12px;margin-bottom:24px}
@media print{body{padding:0}details>p{display:block}summary{display:none}}</style>
</head><body>
<h1>PubMed 文献筛选报告</h1>
<p class="meta">生成时间: ${now} | 共 ${articles.length} 篇文献</p>
${rows}
<p style="text-align:center;color:#9ca3af;font-size:10px;margin-top:30px">Generated by PubMed Monitor Agent</p>
</body></html>`;
}

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function dateStr() { return new Date().toISOString().slice(0, 10); }

// ==========================================================================
// Stats
// ==========================================================================
async function loadStats() {
  try {
    const resp = await fetch('/api/stats');
    const data = await resp.json();
    getEl('stat-total').innerHTML = `<i class="ph ph-database"></i> ${data.total_articles} 篇`;
    getEl('stat-relevant').innerHTML = `<i class="ph ph-star"></i> ${data.high_relevance} 篇高相关`;
  } catch {}
}

// ==========================================================================
// Init
// ==========================================================================
loadConfig();
loadStats();
</script>
